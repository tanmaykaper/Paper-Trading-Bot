name: Daily Paper Trading Bot

on:
  schedule:
    # GitHub uses UTC time. 03:45 UTC is 09:15 AM IST.
    # The '1-5' means it runs Monday through Friday.
    - cron: '45 6 * * 1-5'
  workflow_dispatch: # This line adds a button so you can run it manually anytime!

jobs:
  run-bot:
    runs-on: ubuntu-latest # This boots up a free Linux server

    steps:
    - name: Get files from repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14' # You can change this to match your local Python version

    - name: Install required libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run the trading bot
      run: timeout 5m python run_paper_trading.py || true
